<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toys — Sure Shot Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <a class="logo" href="index.html">SURE SHOT<span>.</span></a>
    <nav>
      <a href="concerts.html">Concerts</a>
      <a href="events.html">Events</a>
      <a href="toys.html" class="active">Toys</a>
      <a href="prints.html">Prints</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <section class="player reveal" id="toys">
    <div class="player-label">TOYS</div>
    <div class="player-stage">
      <img class="player-main" src="ig/toys/01_tron.jpg" alt="">
      <div class="player-ui">
        <button class="p-btn p-prev">&#x2039;</button>
        <span class="p-counter">01 <em>/</em> 06</span>
        <button class="p-btn p-next">&#x203A;</button>
      </div>
    </div>
    <div class="player-thumbs">
      <div class="thumb active" data-src="ig/toys/01_tron.jpg">       <img src="ig/toys/01_tron.jpg"       alt=""></div>
      <div class="thumb"        data-src="ig/toys/02_pacman.jpg">      <img src="ig/toys/02_pacman.jpg"      alt=""></div>
      <div class="thumb"        data-src="ig/toys/03_toysrus.jpg">     <img src="ig/toys/03_toysrus.jpg"     alt=""></div>
      <div class="thumb"        data-src="ig/toys/04_raggedy.jpg">     <img src="ig/toys/04_raggedy.jpg"     alt=""></div>
      <div class="thumb"        data-src="ig/toys/05_lucha.jpg">       <img src="ig/toys/05_lucha.jpg"       alt=""></div>
      <div class="thumb"        data-src="ig/toys/06_beastieboys.jpg"> <img src="ig/toys/06_beastieboys.jpg" alt=""></div>
    </div>
  </section>

  <div class="ticker-wrap">
    <div class="ticker-track">
      <span class="ticker-item">TOYS <span>&bull;</span></span>
      <span class="ticker-item">COLLECTIBLES <span>&bull;</span></span>
      <span class="ticker-item">VINYL TOYS <span>&bull;</span></span>
      <span class="ticker-item">ARCADE <span>&bull;</span></span>
      <span class="ticker-item">SURE SHOT STUDIO <span>&bull;</span></span>
      <span class="ticker-item">POP CULTURE <span>&bull;</span></span>
      <span class="ticker-item">TOYS <span>&bull;</span></span>
      <span class="ticker-item">COLLECTIBLES <span>&bull;</span></span>
      <span class="ticker-item">VINYL TOYS <span>&bull;</span></span>
      <span class="ticker-item">ARCADE <span>&bull;</span></span>
      <span class="ticker-item">SURE SHOT STUDIO <span>&bull;</span></span>
      <span class="ticker-item">POP CULTURE <span>&bull;</span></span>
    </div>
  </div>

  <footer>
    <a class="logo" href="index.html">SURE SHOT<span>.</span></a>
    <p>&copy; 2026 Sure Shot Studio LLC</p>
  </footer>

  <script src="effects.js"></script>
  <script>
    const player = document.querySelector('.player');
    const mainImg = player.querySelector('.player-main');
    const thumbs  = Array.from(player.querySelectorAll('.thumb'));
    const counter = player.querySelector('.p-counter');
    let current = 0;

    function goTo(i) {
      current = (i + thumbs.length) % thumbs.length;
      mainImg.style.opacity = '0';
      setTimeout(() => { mainImg.src = thumbs[current].dataset.src; mainImg.style.opacity = '1'; }, 180);
      thumbs.forEach((t, idx) => t.classList.toggle('active', idx === current));
      counter.innerHTML = String(current+1).padStart(2,'0') + ' <em>/</em> 06';
    }
    player.querySelector('.p-next').addEventListener('click', () => goTo(current + 1));
    player.querySelector('.p-prev').addEventListener('click', () => goTo(current - 1));
    thumbs.forEach((t, i) => t.addEventListener('click', () => goTo(i)));
  </script>
</body>
</html>
