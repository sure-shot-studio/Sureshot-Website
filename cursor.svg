<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer 8-pointed star — Bit YES form -->
  <polygon
    points="18,2 20.5,11.5 29,7 24,15.5 34,18 24,20.5 29,29 20.5,24.5 18,34 15.5,24.5 7,29 12,20.5 2,18 12,15.5 7,7 15.5,11.5"
    fill="#00f8ff" opacity="0.92" filter="url(#glow)"/>
  <!-- Inner diamond core -->
  <polygon points="18,10 23,18 18,26 13,18" fill="#ffffff" opacity="0.85"/>
  <!-- Center dot -->
  <circle cx="18" cy="18" r="2.5" fill="#00f8ff"/>
</svg>
