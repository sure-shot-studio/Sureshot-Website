<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer octagon frame -->
  <polygon points="32,4 68,4 96,32 96,68 68,96 32,96 4,68 4,32"
    stroke="#AAFF00" stroke-width="3.5" fill="none"/>
  <!-- Horizontal scan lines through octagon (Cobra-style) -->
  <line x1="4"  y1="40" x2="96" y2="40" stroke="#AAFF00" stroke-width="1.2" opacity="0.45"/>
  <line x1="4"  y1="50" x2="96" y2="50" stroke="#AAFF00" stroke-width="1.2" opacity="0.45"/>
  <line x1="4"  y1="60" x2="96" y2="60" stroke="#AAFF00" stroke-width="1.2" opacity="0.45"/>
  <!-- Crosshair — cardinal lines, gap at center -->
  <line x1="50" y1="4"  x2="50" y2="32" stroke="#AAFF00" stroke-width="3"/>
  <line x1="50" y1="68" x2="50" y2="96" stroke="#AAFF00" stroke-width="3"/>
  <line x1="4"  y1="50" x2="32" y2="50" stroke="#AAFF00" stroke-width="3"/>
  <line x1="68" y1="50" x2="96" y2="50" stroke="#AAFF00" stroke-width="3"/>
  <!-- Inner diamond -->
  <polygon points="50,33 67,50 50,67 33,50"
    stroke="#AAFF00" stroke-width="2.5" fill="none"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="4" fill="#AAFF00"/>
</svg>
