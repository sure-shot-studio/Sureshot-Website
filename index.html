<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sure Shot Studio LLC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <a class="logo" href="#">SURE SHOT<span>.</span></a>
    <nav>
      <a href="#concerts">Concerts</a>
      <a href="#events">Events</a>
      <a href="#toys">Toys</a>
    </nav>
  </header>

  <section class="hero">
    <h1 class="swoop-title">
      <span class="letter from-left" style="--i:1">S</span><span class="letter from-left" style="--i:2">U</span><span class="letter from-left" style="--i:3">R</span><span class="letter from-left" style="--i:4">E</span><span class="letter letter-space from-left" style="--i:5">&nbsp;</span><span class="letter from-left" style="--i:6">S</span><span class="letter from-left" style="--i:7">H</span><span class="letter from-left" style="--i:8">O</span><span class="letter from-left" style="--i:9">T</span><br>
      <span class="letter highlight from-right" style="--i:6">S</span><span class="letter highlight from-right" style="--i:5">T</span><span class="letter highlight from-right" style="--i:4">U</span><span class="letter highlight from-right" style="--i:3">D</span><span class="letter highlight from-right" style="--i:2">I</span><span class="letter highlight from-right" style="--i:1">O</span>
    </h1>
    <p class="hero-sub">Photography &mdash; Miami</p>
  </section>

  <!-- ── CONCERTS PLAYER ── -->
  <section class="player" id="concerts">
    <div class="player-label">CONCERTS</div>
    <div class="player-stage">
      <img class="player-main" src="ig/concerts/01_shabazz.jpg" alt="">
      <div class="player-ui">
        <button class="p-btn p-prev" aria-label="Previous">&#x2039;</button>
        <span class="p-counter">01 <em>/</em> 06</span>
        <button class="p-btn p-next" aria-label="Next">&#x203A;</button>
      </div>
    </div>
    <div class="player-thumbs">
      <div class="thumb active" data-src="ig/concerts/01_shabazz.jpg">       <img src="ig/concerts/01_shabazz.jpg"       alt=""></div>
      <div class="thumb"        data-src="ig/concerts/02_madlib.jpg">         <img src="ig/concerts/02_madlib.jpg"         alt=""></div>
      <div class="thumb"        data-src="ig/concerts/03_wutang.jpg">         <img src="ig/concerts/03_wutang.jpg"         alt=""></div>
      <div class="thumb"        data-src="ig/concerts/04_djprincepaul.jpg">   <img src="ig/concerts/04_djprincepaul.jpg"   alt=""></div>
      <div class="thumb"        data-src="ig/concerts/05_rakim.jpg">          <img src="ig/concerts/05_rakim.jpg"          alt=""></div>
      <div class="thumb"        data-src="ig/concerts/06_vinylvaudeville.jpg"><img src="ig/concerts/06_vinylvaudeville.jpg" alt=""></div>
    </div>
  </section>

  <!-- ── EVENTS PLAYER ── -->
  <section class="player" id="events">
    <div class="player-label">EVENTS</div>
    <div class="player-stage">
      <img class="player-main" src="ig/events/01_miami_editorial.jpg" alt="">
      <div class="player-ui">
        <button class="p-btn p-prev" aria-label="Previous">&#x2039;</button>
        <span class="p-counter">01 <em>/</em> 06</span>
        <button class="p-btn p-next" aria-label="Next">&#x203A;</button>
      </div>
    </div>
    <div class="player-thumbs">
      <div class="thumb active" data-src="ig/events/01_miami_editorial.jpg"><img src="ig/events/01_miami_editorial.jpg" alt=""></div>
      <div class="thumb"        data-src="ig/events/02_brooklyn_bw.jpg">    <img src="ig/events/02_brooklyn_bw.jpg"     alt=""></div>
      <div class="thumb"        data-src="ig/events/03_djcrew.jpg">          <img src="ig/events/03_djcrew.jpg"          alt=""></div>
      <div class="thumb"        data-src="ig/events/04_filmset.jpg">         <img src="ig/events/04_filmset.jpg"         alt=""></div>
      <div class="thumb"        data-src="ig/events/05_miami_night.jpg">     <img src="ig/events/05_miami_night.jpg"     alt=""></div>
      <div class="thumb"        data-src="ig/events/06_keybiscayne.jpg">     <img src="ig/events/06_keybiscayne.jpg"     alt=""></div>
    </div>
  </section>

  <!-- ── TOYS PLAYER ── -->
  <section class="player" id="toys">
    <div class="player-label">TOYS</div>
    <div class="player-stage">
      <img class="player-main" src="ig/toys/01_tron.jpg" alt="">
      <div class="player-ui">
        <button class="p-btn p-prev" aria-label="Previous">&#x2039;</button>
        <span class="p-counter">01 <em>/</em> 06</span>
        <button class="p-btn p-next" aria-label="Next">&#x203A;</button>
      </div>
    </div>
    <div class="player-thumbs">
      <div class="thumb active" data-src="ig/toys/01_tron.jpg">    <img src="ig/toys/01_tron.jpg"    alt=""></div>
      <div class="thumb"        data-src="ig/toys/02_pacman.jpg">   <img src="ig/toys/02_pacman.jpg"   alt=""></div>
      <div class="thumb"        data-src="ig/toys/03_toysrus.jpg">  <img src="ig/toys/03_toysrus.jpg"  alt=""></div>
      <div class="thumb"        data-src="ig/toys/04_raggedy.jpg">  <img src="ig/toys/04_raggedy.jpg"  alt=""></div>
      <div class="thumb"        data-src="ig/toys/05_lucha.jpg">    <img src="ig/toys/05_lucha.jpg"    alt=""></div>
      <div class="thumb"        data-src="ig/toys/06_beastieboys.jpg"><img src="ig/toys/06_beastieboys.jpg" alt=""></div>
    </div>
  </section>

  <footer>
    <a class="logo" href="#">SURE SHOT<span>.</span></a>
    <p>&copy; 2026 Sure Shot Studio LLC &mdash; All rights reserved</p>
  </footer>

  <script>
    // ── Lazy load ──
    const imgObserver = new IntersectionObserver((entries, obs) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const el = entry.target;
        if (el.tagName === 'IMG' && el.dataset.src) {
          el.src = el.dataset.src;
          el.removeAttribute('data-src');
        }
        obs.unobserve(el);
      });
    }, { rootMargin: '300px' });

    // ── Player logic ──
    document.querySelectorAll('.player').forEach(player => {
      const mainImg   = player.querySelector('.player-main');
      const thumbs    = Array.from(player.querySelectorAll('.thumb'));
      const counter   = player.querySelector('.p-counter');
      let current     = 0;

      // Thumbs already have src set directly — nothing to preload

      // Observe main image
      imgObserver.observe(mainImg);

      function goTo(index) {
        current = (index + thumbs.length) % thumbs.length;
        const src = thumbs[current].dataset.src || thumbs[current].querySelector('img').src;

        mainImg.style.opacity = '0';
        setTimeout(() => {
          mainImg.src = src;
          mainImg.style.opacity = '1';
        }, 180);

        thumbs.forEach((t, i) => t.classList.toggle('active', i === current));
        counter.innerHTML = String(current + 1).padStart(2, '0') + ' <em>/</em> ' + String(thumbs.length).padStart(2, '0');
      }

      player.querySelector('.p-next').addEventListener('click', () => goTo(current + 1));
      player.querySelector('.p-prev').addEventListener('click', () => goTo(current - 1));
      thumbs.forEach((t, i) => t.addEventListener('click', () => goTo(i)));

      // Init main image
      mainImg.src = thumbs[0].dataset.src;
    });
  </script>

</body>
</html>
